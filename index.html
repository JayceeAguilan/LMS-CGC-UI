<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LMS Login Router</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="assets/css/main.css">
  <link rel="stylesheet" href="assets/css/components.css">
</head>
<body>
  <main class="container page-shell">
    <section class="card app-card p-4 p-md-5">
      <h1 class="page-title h3 mb-2">LMS Login Entry</h1>
      <p class="mb-4 text-secondary">Choose a portal or use query routing: <code>?role=student</code> / <code>?role=faculty</code>.</p>
      <div class="d-flex flex-wrap gap-2 mb-3">
        <a class="btn btn-primary" href="?role=student">Student Login</a>
        <a class="btn btn-outline-primary" href="?role=faculty">Faculty Login</a>
      </div>
      <div class="d-flex flex-wrap gap-2">
        <a class="btn btn-link p-0" href="pages/auth/student-login.html">Direct Student Route</a>
        <a class="btn btn-link p-0" href="pages/auth/faculty-login.html">Direct Faculty Route</a>
      </div>
    </section>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="assets/js/main.js"></script>
  <script src="assets/js/login-router.js"></script>
</body>
</html>
